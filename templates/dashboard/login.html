<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Game Backend</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 flex items-center justify-center min-h-screen">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">Game Backend</h1>
      <p class="text-gray-500 text-sm mt-1">Admin Dashboard</p>
    </div>

    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-8">
      {% if messages %}
        {% for msg in messages %}
        <div class="mb-4 px-4 py-3 rounded-lg text-sm bg-red-900/50 border border-red-700 text-red-300">
          {{ msg }}
        </div>
        {% endfor %}
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label class="block text-sm text-gray-400 mb-1.5">Username</label>
          <input type="text" name="username" autofocus required
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white
                   placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1
                   focus:ring-indigo-500 transition text-sm"
            placeholder="admin">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1.5">Password</label>
          <input type="password" name="password" required
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white
                   placeholder-gray-600 focus:outline-none focus:border-indigo-500 focus:ring-1
                   focus:ring-indigo-500 transition text-sm"
            placeholder="••••••••">
        </div>
        <button type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-2.5 rounded-lg
                 transition text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2
                 focus:ring-offset-gray-900">
          Sign in
        </button>
      </form>
    </div>
    <p class="text-center text-xs text-gray-600 mt-6">Staff accounts only</p>
  </div>
</body>
</html>
