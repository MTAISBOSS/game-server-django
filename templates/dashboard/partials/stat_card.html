{% load i18n %}
<div class="bg-gray-900 border border-gray-800 rounded-xl p-5">
  <div class="flex items-center justify-between mb-3">
    <p class="text-xs text-gray-500">{{ label }}</p>
    <div class="w-8 h-8 rounded-lg flex items-center justify-center
      {% if color == 'indigo' %}bg-indigo-600/20 text-indigo-400
      {% elif color == 'green' %}bg-green-600/20 text-green-400
      {% elif color == 'red' %}bg-red-600/20 text-red-400
      {% elif color == 'yellow' %}bg-yellow-600/20 text-yellow-400
      {% else %}bg-gray-700 text-gray-400{% endif %}">
      <i class="fas {{ icon }} text-xs"></i>
    </div>
  </div>
  <p id="{{ id }}" class="text-3xl font-bold text-white">{{ value }}</p>
</div>
