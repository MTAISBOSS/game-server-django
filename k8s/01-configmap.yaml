apiVersion: v1
kind: ConfigMap
metadata:
  name: game-config
  namespace: game-backend
data:
  DEBUG:         "False"
  ALLOWED_HOSTS: "*"
  DB_NAME:       "game_django"
  DB_USER:       "gameuser"
  DB_HOST:       "postgres-service"
  DB_PORT:       "5432"
  REDIS_URL:     "redis://:$(REDIS_PASSWORD)@redis-service:6379/0"
  SMS_PROVIDER:  ""
  LOG_LEVEL:     "INFO"
  CORS_ALLOW_ALL: "True"
