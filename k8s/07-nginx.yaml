---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: game-backend
data:
  nginx.conf: |
    events { worker_connections 4096; }
    http {
      upstream django_api { server game-api-service:8000; keepalive 32; }
      upstream django_ws  { server game-ws-service:8001;  keepalive 16; }

      limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
      limit_req_zone $binary_remote_addr zone=otp:10m rate=5r/10m;

      server {
        listen 80;
        client_max_body_size 10M;

        location /ws/ {
          proxy_pass http://django_ws;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $host;
          proxy_read_timeout 86400;
        }

        location ~ ^/auth/phone/ {
          limit_req zone=otp burst=3 nodelay;
          proxy_pass http://django_api;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
          limit_req zone=api burst=30 nodelay;
          proxy_pass http://django_api;
          proxy_http_version 1.1;
          proxy_set_header Connection "";
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-nginx
  namespace: game-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: game-nginx
  template:
    metadata:
      labels:
        app: game-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: game-nginx-service
  namespace: game-backend
spec:
  selector:
    app: game-nginx
  type: LoadBalancer    # Use NodePort if no cloud LoadBalancer
  ports:
    - port: 80
      targetPort: 80
      name: http
