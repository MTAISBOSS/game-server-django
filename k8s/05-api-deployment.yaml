---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-api
  namespace: game-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: game-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: game-api
    spec:
      containers:
        - name: api
          image: YOUR_REGISTRY/game-backend-django:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: game-config
            - secretRef:
                name: game-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: game-api-service
  namespace: game-backend
spec:
  selector:
    app: game-api
  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: game-api-hpa
  namespace: game-backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: game-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
