---
apiVersion: v1
kind: Namespace
metadata:
  name: game-backend

---
# Store secrets with: kubectl create secret generic game-secrets --from-env-file=.env -n game-backend
# Or apply this file after filling in base64-encoded values
# To encode: echo -n "value" | base64
apiVersion: v1
kind: Secret
metadata:
  name: game-secrets
  namespace: game-backend
type: Opaque
stringData:
  DJANGO_SECRET_KEY:  "CHANGE_ME_LONG_DJANGO_SECRET"
  DB_PASSWORD:        "gamepassword"
  REDIS_PASSWORD:     "redispassword"
  JWT_ACCESS_SECRET:  "CHANGE_ME_JWT_ACCESS_SECRET"
  POSTGRES_PASSWORD:  "gamepassword"
  ADMIN_USERNAME:     "admin"
  ADMIN_PASSWORD:     "CHANGE_ME_ADMIN_PASSWORD"
  TWILIO_SID:         ""
  TWILIO_TOKEN:       ""
  TWILIO_FROM:        ""
